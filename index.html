<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Max Pain Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F4F6F9; color: #1E293B; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        #spinner { display: flex; align-items: center; justify-content: center; height: 100vh; }
        #spinner .dot { width: 12px; height: 12px; border-radius: 50%; background: #f7931a; margin: 0 6px; animation: bounce 1.4s infinite ease-in-out both; }
        #spinner .dot:nth-child(1) { animation-delay: -0.32s; }
        #spinner .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="spinner"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div id="root"></div>
    <script src="btc-data-engine.js?v=1"></script>
    <script src="bundle.js?v=1"></script>
</body>
</html>
